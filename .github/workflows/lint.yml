name: Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dev deps
        run: uv sync --group dev

      - name: Lint with ruff
        run: uv run ruff check ytm_cli/ tests/ --output-format=github

      - name: Check formatting with ruff
        run: uv run ruff format --check ytm_cli/ tests/
