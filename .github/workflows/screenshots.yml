name: Screenshots

on:
  push:
    branches: [main]
    paths:
      - 'ytm_cli/**'
      - 'screenshots/**.tape'
      - '.github/workflows/screenshots.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ytm_cli/**'
      - 'screenshots/**.tape'
      - '.github/workflows/screenshots.yml'
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --no-dev

      - name: Install ffmpeg + mpv
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg mpv

      - name: Install ttyd
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --repo tsl0922/ttyd --json tagName -q .tagName)
          gh release download "$TAG" --repo tsl0922/ttyd \
            --pattern 'ttyd.x86_64' --output /tmp/ttyd
          sudo install -m 0755 /tmp/ttyd /usr/local/bin/ttyd
          ttyd --version

      - name: Install vhs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --repo charmbracelet/vhs --json tagName -q .tagName)
          VERSION=${TAG#v}
          gh release download "$TAG" --repo charmbracelet/vhs \
            --pattern "vhs_${VERSION}_Linux_x86_64.tar.gz" --output /tmp/vhs.tar.gz
          tar -xzf /tmp/vhs.tar.gz -C /tmp
          sudo install -m 0755 "/tmp/vhs_${VERSION}_Linux_x86_64/vhs" /usr/local/bin/vhs
          vhs --version
          ffmpeg -version | head -1

      - name: Generate screenshots
        run: |
          for tape in screenshots/*.tape; do
            echo "▶ Rendering $tape"
            vhs "$tape"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            screenshots/*.png
            screenshots/*.gif
            screenshots/*.webm
          retention-days: 30

      - name: Comment on PR with preview
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: screenshots
          message: |
            ### 📸 UI Screenshots

            Generated from every `screenshots/*.tape` against this PR.
            Download the `screenshots` artifact above for the gif / png / webm.
