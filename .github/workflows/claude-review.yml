name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > /tmp/pr_diff.txt

      - name: Read project conventions
        run: |
          if [ -f CLAUDE.md ]; then
            head -c 3000 CLAUDE.md > /tmp/conventions.txt
          else
            echo "No CLAUDE.md found" > /tmp/conventions.txt
          fi

      - name: Review with Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DIFF=$(cat /tmp/pr_diff.txt)
          CONVENTIONS=$(cat /tmp/conventions.txt)

          if [ -z "$DIFF" ]; then
            echo '{"summary":"No code changes to review.","comments":[]}' > /tmp/review.json
            exit 0
          fi

          PROMPT=$(cat <<'EOF'
          You are a code reviewer. Review the following PR diff and return a JSON response.

          Return ONLY valid JSON with this exact structure, no markdown:
          {
            "summary": "Brief overall summary of the review",
            "comments": [
              {
                "path": "path/to/file.py",
                "line": 10,
                "severity": "critical|warning|suggestion",
                "body": "Description of the issue and suggested fix"
              }
            ]
          }

          Rules:
          - "line" must be a line number from the NEW file (lines with + in the diff)
          - "path" must match the file path from the diff header (after b/)
          - Only comment on real issues: security, bugs, performance, correctness
          - Use markdown in "body" for code blocks
          - If everything looks good, return empty comments array

          EOF
          )

          FULL_PROMPT="$PROMPT

          Project conventions:
          $CONVENTIONS

          Diff:
          $DIFF"

          for i in 1 2 3; do
            RESPONSE=$(jq -n --arg prompt "$FULL_PROMPT" \
              '{
                model: "claude-sonnet-4-20250514",
                max_tokens: 4096,
                messages: [{role: "user", content: $prompt}]
              }' | curl -s -w "\n%{http_code}" \
                https://api.anthropic.com/v1/messages \
                -H "x-api-key: $ANTHROPIC_API_KEY" \
                -H "content-type: application/json" \
                -H "anthropic-version: 2023-06-01" \
                -d @-)

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" = "200" ]; then
              echo "$BODY" | jq -r '.content[0].text' > /tmp/review.json
              break
            fi

            echo "Attempt $i failed with HTTP $HTTP_CODE, retrying in $((i * 30))s..."
            sleep $((i * 30))
          done

          if [ "$HTTP_CODE" != "200" ]; then
            echo '{"summary":"Claude API failed after 3 attempts.","comments":[]}' > /tmp/review.json
          fi

      - name: Post inline review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEW=$(cat /tmp/review.json)
          SUMMARY=$(echo "$REVIEW" | jq -r '.summary // "No summary"')
          COMMENTS=$(echo "$REVIEW" | jq -c '.comments // []')
          COMMIT_SHA=${{ github.event.pull_request.head.sha }}
          PR_NUMBER=${{ github.event.pull_request.number }}

          # Build the review comments array for GitHub API
          NUM_COMMENTS=$(echo "$COMMENTS" | jq 'length')

          if [ "$NUM_COMMENTS" -gt 0 ]; then
            # Create review with inline comments
            REVIEW_COMMENTS=$(echo "$COMMENTS" | jq -c '[.[] | {
              path: .path,
              line: .line,
              body: (
                (if .severity == "critical" then "🚨 **Critical**: "
                 elif .severity == "warning" then "⚠️ **Warning**: "
                 else "💡 **Suggestion**: " end) + .body
              )
            }]')

            jq -n \
              --arg body "## 🤖 Claude Code Review\n\n$SUMMARY" \
              --arg sha "$COMMIT_SHA" \
              --argjson comments "$REVIEW_COMMENTS" \
              '{
                body: $body,
                event: "COMMENT",
                commit_id: $sha,
                comments: $comments
              }' | gh api \
                "repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" \
                --method POST \
                --input -
          else
            # No inline comments, just post summary
            gh pr comment "$PR_NUMBER" \
              --body "## 🤖 Claude Code Review

          $SUMMARY

          ✅ No issues found."
          fi
